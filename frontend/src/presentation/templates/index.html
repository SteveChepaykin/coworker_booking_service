<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coworking Room Booker</title>
    <link rel="stylesheet" href="../style/style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>Coworking Room Booker</h1>
        </header>

        <main class="content-wrapper">
            <div class="list-section">
                <h2>1. Select a Coworking Space</h2>
                <ul id="spaces-list" class="item-list">
                    <!-- Coworking spaces will be loaded here -->
                </ul>

                <h2 id="rooms-header" class="hidden">2. Select a Room in <span id="selected-space-name"></span></h2>
                <ul id="rooms-list" class="item-list hidden">
                    <!-- Rooms will be loaded here -->
                </ul>
            </div>

            <div class="bookings-section">
                <h2>My Upcoming Bookings</h2>
                <ul id="my-bookings-list" class="item-list">
                    <!-- User's bookings will be loaded here -->
                </ul>
            </div>
        </main>
    </div>

    <!-- Booking Modal -->
    <div id="booking-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <h2>Book Room: <span id="modal-room-name"></span></h2>
            <form id="booking-form">
                <input type="hidden" id="modal-room-id">
                <label for="start-time">Start Time:</label>
                <input type="datetime-local" id="start-time" required>
                
                <label for="end-time">End Time:</label>
                <input type="datetime-local" id="end-time" required>
                
                <label for="purpose">Purpose:</label>
                <input type="text" id="purpose" placeholder="e.g., Team Meeting">
                
                <button type="submit">Confirm Booking</button>
            </form>
        </div>
    </div>

    <script src="../../scripts/app.js"></script>
</body>
</html>
