<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coworking Rooms Booking</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Coworking Rooms Booking</h1>
    </header>
    
    <main class="container">
        <!-- Left Sidebar: Spaces List -->
        <aside id="spaces-section">
            <h2>Coworking Spaces</h2>
            <div id="spaces-loader" class="hidden">Loading spaces...</div>
            <div id="spaces-error" class="error hidden"></div>
            <ul id="spaces-list" class="list"></ul>
        </aside>

        <!-- Right Main Content: Rooms & My Bookings -->
        <section id="main-content">
            <div id="rooms-section" class="hidden">
                <h2>Rooms in <span id="selected-space-name"></span></h2>
                <div id="rooms-loader" class="hidden">Loading rooms...</div>
                <div id="rooms-error" class="error hidden"></div>
                <ul id="rooms-list" class="list grid-list"></ul>
            </div>

            <div id="bookings-section">
                <h2>My Upcoming Bookings</h2>
                <div id="bookings-loader" class="hidden">Loading bookings...</div>
                <div id="bookings-error" class="error hidden"></div>
                <ul id="my-bookings-list" class="list"></ul>
            </div>
        </section>
    </main>

    <!-- Booking Modal -->
    <div id="booking-modal" class="hidden">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <h2>Book Room: <span id="modal-room-name"></span></h2>
            <div id="modal-error" class="error hidden"></div>
            <form id="booking-form">
                <input type="hidden" id="modal-room-id" name="roomId">
                <div class="form-group">
                    <label for="startTime">Start Time:</label>
                    <input type="datetime-local" id="startTime" name="startTime" required>
                </div>
                <div class="form-group">
                    <label for="endTime">End Time:</label>
                    <input type="datetime-local" id="endTime" name="endTime" required>
                </div>
                <div class="form-group">
                    <label for="purpose">Purpose (Optional):</label>
                    <input type="text" id="purpose" name="purpose" placeholder="e.g., Team Meeting">
                </div>
                <button type="submit" id="confirm-booking-btn">Confirm Booking</button>
            </form>
        </div>
    </div>

    <!-- HTML Templates used by app.js -->
    <template id="space-item-template">
        <li class="item card">
            <h3 class="item-name"></h3>
            <p class="item-detail text-muted"></p>
        </li>
    </template>
    <template id="room-item-template">
        <li class="bookable card">
            <h3 class="item-name"></h3>
            <p class="item-detail text-muted"></p>
        </li>
    </template>
    <template id="booking-item-template">
        <li class="card booking-card"></li>
    </template>

    <script src="app.js"></script>
</body>
</html>
