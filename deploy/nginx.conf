events {
    worker_connections 1024;
}

http {
    server {
        listen 8000;
        location / {
            resolver 127.0.0.11 ipv6=off valid=5s;
            set $backend_api "http://backend:8000";
            proxy_pass $backend_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}